name: Deploy to GitHub Pages

on:
  # 当 main 分支有 push 时触发
  push:
    branches: ["main"]
  # 允许手动触发工作流
  workflow_dispatch:

# 设置权限（GitHub Pages 部署所需）
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：只允许一个部署任务运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Pages
        uses: actions/configure-pages@v5

      - name: 上传静态文件
        uses: actions/upload-pages-artifact@v3
        with:
          # 指定需要部署的目录（默认为仓库根目录）
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
