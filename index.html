<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试页面 - GitHub Pages</title>
</head>
<body>
    <h1>🎉 你好，GitHub Pages 工作正常！</h1>

    <p>当前时间：<span id="time"></span></p>

        document.getElementById('time').innerText = new Date().toLocaleString();
    </script>
</body>
</html>
